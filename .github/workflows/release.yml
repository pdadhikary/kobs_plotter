name: Build release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build for'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        include:
          - os: windows-latest
            archive_ext: zip
          - os: ubuntu-latest
            archive_ext: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install PyInstaller
        run: uv add --dev pyinstaller

      - name: Get version from pyproject.toml
        id: get_version
        shell: bash
        run: |
          VERSION=$(uv run python -c "import tomllib; f=open('pyproject.toml','rb'); d=tomllib.load(f); print(d['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Embeds publisher/version metadata into the Windows exe's VS_VERSION_INFO
      # resource (Properties -> Details tab). This populates the file properties
      # only; it does not clear the SmartScreen "Unknown publisher" warning,
      # which requires Authenticode code signing (not wired up in this workflow).
      - name: Generate Windows version-info resource
        if: matrix.os == 'windows-latest'
        shell: python
        run: |
          import re, textwrap
          version = "${{ steps.get_version.outputs.version }}"
          nums = [int(m.group()) for m in re.finditer(r"\d+", version)]
          nums = (nums + [0, 0, 0, 0])[:4]
          v0, v1, v2, v3 = nums
          vers_tuple = f"{v0},{v1},{v2},{v3}"
          template = textwrap.dedent("""\
              # UTF-8
              # Generated by .github/workflows/release.yml from pyproject.toml — do not edit by hand.

              VSVersionInfo(
                ffi=FixedFileInfo(
                  filevers=(VERS_TUPLE),
                  prodvers=(VERS_TUPLE),
                  mask=0x3f,
                  flags=0x0,
                  OS=0x40004,
                  fileType=0x1,
                  subtype=0x0,
                  date=(0,0),
                ),
                kids=[
                  StringFileInfo([
                    StringTable('040904B0', [
                      StringStruct('CompanyName', 'Adhikary'),
                      StringStruct('FileDescription', 'A desktop application for scientific curve fitting and publication-ready visualization'),
                      StringStruct('FileVersion', 'VERSION'),
                      StringStruct('InternalName', 'kobs-plotter'),
                      StringStruct('LegalCopyright', 'Copyright (c) Prachurya Deepta Adhikary (MIT License)'),
                      StringStruct('OriginalFilename', 'kobs-plotter.exe'),
                      StringStruct('ProductName', 'Kobs-Plotter'),
                      StringStruct('ProductVersion', 'VERSION'),
                    ]),
                  ]),
                  VarFileInfo([VarStruct('Translation', [0x409, 1200])]),
                ],
              )
              """)
          content = template.replace("VERS_TUPLE", vers_tuple).replace("VERSION", version)
          with open("version_info.txt", "w", encoding="utf-8") as f:
              f.write(content)
          print(f"Wrote version_info.txt (filevers={vers_tuple}, version={version})")

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libglib2.0-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxkbcommon-x11-0

      # Single source of truth for the build: kobs-plotter.spec handles
      # platform differences (icon, console, Windows version resource),
      # the excludes list, optimize=2, and the bootloader Splash.
      - name: Build executable
        run: uv run pyinstaller --clean --noconfirm kobs-plotter.spec

      - name: Archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.version }}"
          $archive = "kobs-plotter-$version-windows.zip"
          Compress-Archive -Path dist/kobs-plotter -DestinationPath $archive
          echo "ARCHIVE_NAME=$archive" >> $env:GITHUB_ENV
          echo "RELEASE_ASSET=$archive" >> $env:GITHUB_ENV

      - name: Archive (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          ARCHIVE="kobs-plotter-$VERSION-linux.tar.gz"
          tar -czf $ARCHIVE -C dist kobs-plotter
          echo "ARCHIVE_NAME=$ARCHIVE" >> $GITHUB_ENV
          echo "RELEASE_ASSET=$ARCHIVE" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ env.RELEASE_ASSET }}

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ steps.get_version.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.get_version.outputs.version, 'a') || contains(steps.get_version.outputs.version, 'b') || contains(steps.get_version.outputs.version, 'rc') }}
          files: ${{ env.RELEASE_ASSET }}
